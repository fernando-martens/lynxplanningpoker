<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Lynx Planning Poker — OG image</title>
<style>
  @font-face {
    font-family: "Baloo 2";
    font-style: normal;
    font-weight: 400 800;
    src: url("../app/priv/static/fonts/baloo2-latin.woff2") format("woff2");
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: oklch(92% 0.004 286);
    font-family: "Baloo 2", system-ui, sans-serif;
  }

  /* Open Graph image — 1200 x 630 (1.91:1) */
  .cover {
    position: relative;
    width: 1200px;
    height: 630px;
    overflow: hidden;
    /* soft light-mode gray, no strong contrast */
    background:
      linear-gradient(160deg,
        oklch(99% 0 0) 0%,
        oklch(96% 0.003 286) 58%,
        oklch(93.5% 0.005 286) 100%);
  }

  /* left — text block */
  .content {
    position: absolute;
    left: 84px;
    top: 0;
    height: 100%;
    width: 640px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 22px;
    z-index: 3;
  }

  h1 {
    font-size: 88px;
    font-weight: 800;
    line-height: 0.99;
    color: oklch(24% 0.02 281);
    letter-spacing: -0.01em;
  }
  h1 .accent { color: oklch(45% 0.21 273); }

  .tagline {
    font-size: 30px;
    font-weight: 500;
    line-height: 1.34;
    color: oklch(46% 0.015 286);
    max-width: 560px;
  }

  .pills {
    display: flex;
    gap: 14px;
    margin-top: 12px;
  }
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    padding: 12px 24px;
    border-radius: 999px;
    background: oklch(99% 0 0);
    border: 2px solid oklch(45% 0.20 273 / 0.28);
    color: oklch(32% 0.01 286);
    font-size: 21px;
    font-weight: 700;
  }
  .pill .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: oklch(52% 0.19 273);
  }

  /* right — mascot */
  .mascot {
    position: absolute;
    right: 70px;
    top: 0;
    height: 100%;
    width: 380px;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .mascot img {
    position: relative;
    width: 350px;
    height: auto;
    z-index: 1;
  }
</style>
</head>
<body>
  <div class="cover">
    <div class="content">
      <h1>Lynx<br />Planning&nbsp;<span class="accent">Poker</span></h1>
      <p class="tagline">
        Free, real-time story-point estimation for agile&nbsp;&amp;&nbsp;scrum teams.
      </p>
      <div class="pills">
        <span class="pill"><span class="dot"></span>No sign-up</span>
        <span class="pill"><span class="dot"></span>Real-time</span>
        <span class="pill"><span class="dot"></span>100% free</span>
      </div>
    </div>

    <div class="mascot">
      <img src="../app/priv/static/images/lynx.svg" alt="Lynx mascot" />
    </div>
  </div>
</body>
</html>
