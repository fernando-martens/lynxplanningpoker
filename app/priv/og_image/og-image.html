<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Lynx Planning Poker — social share image</title>
    <style>
      @font-face {
        font-family: "Baloo 2";
        font-weight: 400 800;
        font-display: block;
        src: url("../static/fonts/baloo2-latin.woff2") format("woff2");
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 1200px;
        height: 630px;
      }

      body {
        font-family: "Baloo 2", sans-serif;
        background: radial-gradient(
          120% 150% at 82% 8%,
          #8b5cf6 0%,
          #6d28d9 42%,
          #3b0d77 100%
        );
        color: #ffffff;
        overflow: hidden;
        position: relative;
      }

      .wrap {
        display: flex;
        height: 100%;
        align-items: center;
        padding: 0 76px;
      }

      .left {
        flex: 1;
        z-index: 4;
      }

      .eyebrow {
        font-size: 25px;
        font-weight: 700;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: #ddd6fe;
        margin-bottom: 20px;
      }

      h1 {
        font-size: 84px;
        line-height: 1.0;
        font-weight: 800;
        letter-spacing: -0.02em;
      }

      .tag {
        margin-top: 26px;
        font-size: 33px;
        font-weight: 500;
        color: #ede9fe;
        max-width: 600px;
        line-height: 1.3;
      }

      .pills {
        margin-top: 38px;
        display: flex;
        gap: 14px;
      }

      .pill {
        font-size: 23px;
        font-weight: 700;
        padding: 11px 24px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.14);
        border: 1.5px solid rgba(255, 255, 255, 0.28);
      }

      .right {
        width: 440px;
        height: 100%;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .glow {
        position: absolute;
        width: 460px;
        height: 460px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(255, 255, 255, 0.24) 0%,
          transparent 68%
        );
        z-index: 0;
      }

      .mascot {
        width: 388px;
        height: 388px;
        object-fit: contain;
        position: relative;
        z-index: 3;
        filter: drop-shadow(0 22px 38px rgba(0, 0, 0, 0.38));
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="left">
        <div class="eyebrow">Planning Poker</div>
        <h1>Lynx Planning&nbsp;Poker</h1>
        <div class="tag">
          Free, real-time story-point estimation for agile teams.
        </div>
        <div class="pills">
          <div class="pill">No sign-up</div>
          <div class="pill">Real-time</div>
          <div class="pill">100% free</div>
        </div>
      </div>
      <div class="right">
        <div class="glow"></div>
        <img class="mascot" src="../static/images/lynx.svg" alt="" />
      </div>
    </div>
  </body>
</html>
